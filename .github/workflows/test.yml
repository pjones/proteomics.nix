name: "Build and Test"

on:
  pull_request:
    branches: [ "trunk" ]

  push:
    branches: [ "openms-next" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: cachix/cachix-action@v14
        with:
          name: proteomics
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: OpenMS on macOS
        if: runner.os == 'macOS'
        run: nix build .#openms.pyopenms --print-build-logs

      - name: Build Everything on Linux
        if: runner.os == 'Linux'
        run: nix flake check --print-build-logs
